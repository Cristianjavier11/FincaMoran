kind = "web"
previewPath = "/"
title = "Finca Moran"
version = "1.0.0"
id = "artifacts/finca-moran"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24609

[services.development]
run = "pnpm --filter @workspace/finca-moran run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/finca-moran", "run", "build" ]
publicDir = "artifacts/finca-moran/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24609"
BASE_PATH = "/"
